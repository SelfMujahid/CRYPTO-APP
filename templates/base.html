<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CRYPTO-APP-DEMO{% endblock %}</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    {% block head_extra %}{% endblock %}
</head>
<body data-page="{% block page_id %}base{% endblock %}">
    <header>
        <div class="top-left-logo">
            <span class="fab fa-bitcoin logo-with-border" aria-hidden="true"></span>
            <span>Self Mujahid</span>
        </div>
        <nav>
            <ul>
                <li><a href="/" class="{% if page_name == 'home' %}active{% endif %}">Home</a></li>
                <li><a href="/btc" class="{% if page_name == 'btc' %}active{% endif %}">Real-Time BTC Data</a></li>
                <li><a href="/trading" class="{% if page_name == 'trading' %}active{% endif %}">Trading</a></li>
                <li><a href="/chart" class="{% if page_name == 'chart' %}active{% endif %}">Chart</a></li>
            </ul>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer id="about">
        <p class="footer-text">CRYPTO-APP-DEMO</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
